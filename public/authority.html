<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Authority Portal | CivicGuard</title>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <nav class="border-b border-slate-800 bg-[#1e293b]/50 p-6 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-400 hover:text-cyan-400 transition">← Back to Hub</a>
                <h1 class="text-xl font-black tracking-tighter">Authority <span class="text-cyan-400">Panel</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2 py-1 rounded">Official Access</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <header class="mb-10">
            <h2 class="text-3xl font-bold">Manage Incidents</h2>
            <p class="text-slate-500 text-sm">Review incoming reports and update their resolution status.</p>
        </header>

        <div class="bg-[#1e293b] border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-[11px] uppercase tracking-widest text-slate-500 font-black">
                    <tr>
                        <th class="p-6">Reporter</th>
                        <th class="p-6">Incident Details</th>
                        <th class="p-6">Status</th>
                        <th class="p-6 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="authorityTable" class="divide-y divide-slate-800">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchAllComplaints() {
            const response = await fetch('http://localhost:3000/all-complaints');
            const data = await response.json();
            const table = document.getElementById('authorityTable');
            table.innerHTML = '';

            data.forEach(item => {
                const isPending = item.status === 'Pending';
                const statusColor = isPending ? 'text-amber-400' : 'text-emerald-400';
                
                table.innerHTML += `
                    <tr class="hover:bg-slate-800/20 transition-all">
                        <td class="p-6">
                            <span class="block font-bold text-slate-100">${item.username}</span>
                            <span class="text-[10px] text-slate-500 uppercase">User ID: ${item.user_id}</span>
                        </td>
                        <td class="p-6">
                            <h3 class="font-bold text-indigo-300">${item.title}</h3>
                            <p class="text-sm text-slate-400 mb-1">${item.description}</p>
                            <span class="text-[10px] text-slate-500 uppercase">📍 ${item.location}</span>
                        </td>
                        <td class="p-6">
                            <span class="text-xs font-black uppercase ${statusColor}">${item.status}</span>
                        </td>
                        <td class="p-6 text-right">
                            ${isPending ? `
                                <button onclick="changeStatus(${item.id}, 'Resolved')" 
                                    class="bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold px-4 py-2 rounded-xl transition-all shadow-lg">
                                    Mark Resolved
                                </button>
                            ` : `
                                <span class="text-[10px] font-bold text-slate-600">Archived</span>
                            `}
                        </td>
                    </tr>
                `;
            });
        }

        async function changeStatus(id, newStatus) {
            await fetch('http://localhost:3000/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status: newStatus })
            });
            fetchAllComplaints(); // Refresh table
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchAllComplaints();
    </script>
</body>
</html>
