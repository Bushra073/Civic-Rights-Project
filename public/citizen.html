    <nav class="border-b border-slate-800 bg-[#1e293b]/50 backdrop-blur-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="flex items-center gap-2 text-slate-400 hover:text-indigo-400 transition-all group">
                <span class="text-xl group-hover:-translate-x-1 transition-transform">←</span>
                <span class="text-sm font-bold uppercase tracking-widest">Dashboard</span>
            </a>
            <span class="text-slate-700">|</span>
            <h1 class="text-xl font-black text-white">Civic<span class="text-indigo-500">Guard</span></h1>
        </div>

        <button onclick="logout()" class="text-xs font-bold text-slate-500 hover:text-red-400 uppercase tracking-tighter transition">

    <main class="container mx-auto px-6 py-10 grid lg:grid-cols-12 gap-10">
        <div class="mb-6 text-[10px] font-bold uppercase tracking-widest text-slate-500 flex gap-2">
    <a href="dashboard.html" class="hover:text-indigo-400">Dashboard</a>
    <span>/</span>
    <span class="text-slate-300">Current Page</span>
</div>
        <div class="lg:col-span-5">
            <div class="bg-[#1e293b] border border-slate-700 p-8 rounded-2xl shadow-2xl">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-indigo-500 rounded-full"></span> Report Violation
                </h2>
                <form id="complaintForm" class="space-y-5">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Incident Title</label>
                        <input type="text" id="title" required class="w-full mt-2 bg-[#0f172a] border border-slate-700 rounded-xl p-3 focus:border-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Category</label>
                        <select id="category" class="w-full mt-2 bg-[#0f172a] border border-slate-700 rounded-xl p-3 focus:border-indigo-500 outline-none">
                            <option value="Road Safety">Road Safety</option>
                            <option value="Consumer Fraud">Consumer Fraud</option>
                            <option value="Public Harassment">Public Harassment</option>
                            <option value="Infrastructure">Infrastructure</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Location</label>
                        <input type="text" id="location" required class="w-full mt-2 bg-[#0f172a] border border-slate-700 rounded-xl p-3 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Detailed Description</label>
                        <textarea id="description" rows="4" class="w-full mt-2 bg-[#0f172a] border border-slate-700 rounded-xl p-3 focus:border-indigo-500 outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all">
                        Launch Report
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-7">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> Live Tracking
            </h2>
            <div id="complaintList" class="space-y-4">
                <div class="bg-[#1e293b]/40 border border-slate-800 p-6 rounded-2xl animate-pulse">
                    <p class="text-slate-500 italic text-center">Loading your reports...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'index.html';

        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                user_id: user.id,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value
            };

            const response = await fetch('http://localhost:3000/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("Incident Registered Successfully.");
                e.target.reset();
                loadComplaints();
            }
        };

       async function loadComplaints() {
    const user = JSON.parse(localStorage.getItem('user'));
    const response = await fetch(`http://localhost:3000/my-complaints/${user.id}`);
    const complaints = await response.json();

    const list = document.getElementById('complaintList');
    list.innerHTML = ''; // Clear the "Loading" message

    if (complaints.length === 0) {
        list.innerHTML = `<p class="text-slate-500 italic text-center">No reports submitted yet.</p>`;
        return;
    }

    complaints.forEach(item => {
        // Aesthetic Status Colors
        const statusColor = item.status === 'Pending' ? 'text-amber-400' : 'text-emerald-400';
        
        list.innerHTML += `
            <div class="bg-[#1e293b] border border-slate-700 p-5 rounded-2xl hover:border-indigo-500 transition-all shadow-lg">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="font-bold text-lg text-slate-100">${item.title}</h3>
                    <span class="text-xs font-black uppercase tracking-tighter ${statusColor}">${item.status}</span>
                </div>
                <p class="text-slate-400 text-sm mb-3">${item.description}</p>
                <div class="flex justify-between items-center text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                    <span>📍 ${item.location}</span>
                    <span>📅 ${new Date(item.created_at).toLocaleDateString()}</span>
                </div>
            </div>
        `;
    });
}

// Call this when the page loads so the user sees their history immediately
loadComplaints();

        function logout() {
            localStorage.clear();// This wipes your login info for safety
            window.location.href = 'index.html';// Sends you back to the start
        }
    </script>
</body>
</html>
